<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign Up</title>
  <style>
    :root{--bg:#f8fafc;--card:#ffffff;--accent:#2563eb;--muted:#6b7280}
    body{font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .card{background:var(--card);border:1px solid #e6edf3;border-radius:12px;padding:28px;max-width:420px;width:100%;box-shadow:0 6px 20px rgba(16,24,40,0.06)}
    h1{margin:0 0 8px;font-size:20px}
    p.lead{margin:0 0 18px;color:var(--muted);font-size:14px}
    label{display:block;font-size:13px;margin-bottom:6px;color:#111827}
    input[type=text],input[type=email],input[type=password]{width:100%;padding:10px 12px;border:1px solid #e6eef6;border-radius:8px;background:#fff;margin-bottom:12px;font-size:14px}
    .row{display:flex;gap:12px}
    .checkbox{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:#fff;padding:10px 14px;border-radius:10px;border:0;cursor:pointer;font-weight:600}
    .btn:disabled{opacity:0.6;cursor:not-allowed}
    .muted{color:var(--muted);font-size:13px}
    .error{color:#dc2626;font-size:13px;margin-bottom:8px}
    .success{background:#ecfdf5;border:1px solid #bbf7d0;color:#064e3b;padding:10px;border-radius:8px;margin-top:12px}
    small.note{display:block;margin-top:8px;color:var(--muted)}
  </style>
</head>
<body>
  <main class="card" role="main">
    <h1>Sign Up</h1>
    <p class="lead">Create your account. All fields are required for the test.</p>

    <form id="signup-form" novalidate>
      <div>
        <label for="username">Username</label>
        <input id="username" name="username" data-testid="username" type="text" autocomplete="username" required placeholder="your-name" />
      </div>

      <div>
        <label for="email">Email</label>
        <input id="email" name="email" data-testid="email" type="email" autocomplete="email" required placeholder="you@example.com" />
      </div>

      <div class="row">
        <div style="flex:1">
          <label for="password">Password</label>
          <input id="password" name="password" data-testid="password" type="password" minlength="8" required autocomplete="new-password" placeholder="At least 8 characters" />
        </div>
        <div style="flex:1">
          <label for="confirm">Confirm</label>
          <input id="confirm" name="confirm" data-testid="confirm-password" type="password" minlength="8" required placeholder="Repeat password" />
        </div>
      </div>

      <div class="checkbox">
        <input id="terms" name="terms" data-testid="terms" type="checkbox" required />
        <label for="terms" class="muted">I agree to the Terms and Conditions</label>
      </div>

      <div id="form-error" class="error" aria-live="polite" style="display:none"></div>

      <button id="submit" data-testid="submit" class="btn" type="submit">Submit</button>

      <small class="note">This page is a local demo for Playwright/automation tests.</small>

      <div id="success" class="success" role="status" aria-live="polite" style="display:none" data-testid="success-message"></div>
    </form>
  </main>

  <script>
    (function(){
      const form = document.getElementById('signup-form');
      const submit = document.getElementById('submit');
      const errorBox = document.getElementById('form-error');
      const successBox = document.getElementById('success');

      form.addEventListener('submit', async function(e){
        e.preventDefault();
        errorBox.style.display = 'none';
        successBox.style.display = 'none';

        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm').value;
        const terms = document.getElementById('terms').checked;

        // Basic front-end validation (tests typically check visibility and attributes)
        if(!username || !email || !password || !confirm){
          showError('Please fill in all fields.');
          return;
        }
        if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){
          showError('Please enter a valid email.');
          return;
        }
        if(password.length < 8){
          showError('Password must be at least 8 characters.');
          return;
        }
        if(password !== confirm){
          showError('Passwords do not match.');
          return;
        }
        if(!terms){
          showError('You must accept the terms.');
          return;
        }

        // Show loading state
        submit.disabled = true;
        const original = submit.innerHTML;
        submit.innerHTML = 'Submitting...';

        try{
          // Simulate async server call
          await new Promise(r => setTimeout(r, 700));

          // On success, expose a success message and set a data attribute tests can read
          successBox.textContent = `Account created for ${username} (${email}).`;
          successBox.style.display = 'block';
          form.setAttribute('data-submitted', 'true');

          // Optionally, clear inputs (tests may expect fields to remain; we only keep success visible)
        }catch(err){
          showError('Submission failed.');
        }finally{
          submit.disabled = false;
          submit.innerHTML = original;
        }
      });

      function showError(msg){
        errorBox.textContent = msg;
        errorBox.style.display = 'block';
        form.setAttribute('data-submitted', 'false');
      }
    })();
  </script>
</body>
</html>
